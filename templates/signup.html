<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API TESTER - Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="{{ url_for('static', filename='signup_style.css') }}" rel="stylesheet" />
</head>
<body>
  <!-- Signup Form -->
  <div class="auth-container" id="signupForm">
    <h2>Sign Up</h2>
    <form id="signupFormElement" method="POST" action="{{ url_for('signup') }}" onsubmit="return validateSignup();">
      <div class="form-group">
        <input type="text" id="signupName" name="name" placeholder="Full Name" />
        <div class="error" id="signupNameError" style="display:none;">Name is required and should be at least 3 characters.</div>
      </div>
      <div class="form-group">
        <input type="email" id="signupEmail" name="username" placeholder="Email" />
        <div class="error" id="signupEmailError" style="display:none;">Enter a valid email.</div>
      </div>
      <div class="form-group">
        <input type="password" id="signupPassword" name="password" placeholder="Password" />
        <span class="toggle-password" onclick="togglePassword('signupPassword')">👁</span>
        <div class="error" id="signupPasswordError" style="display:none;">Password must be at least 6 characters.</div>
      </div>
      <div class="form-group">
        <input type="password" id="signupConfirm" placeholder="Confirm Password" />
        <span class="toggle-password" onclick="togglePassword('signupConfirm')">👁</span>
        <div class="error" id="signupConfirmError" style="display:none;">Passwords do not match.</div>
      </div>
      <button type="submit">Sign Up</button>
      <div class="switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
    </form>
  </div>

  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    function validateSignup() {
      let valid = true;

      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const confirm = document.getElementById("signupConfirm").value;

      const nameError = document.getElementById("signupNameError");
      const emailError = document.getElementById("signupEmailError");
      const passwordError = document.getElementById("signupPasswordError");
      const confirmError = document.getElementById("signupConfirmError");

      // Hide all errors initially
      nameError.style.display = emailError.style.display = passwordError.style.display = confirmError.style.display = "none";

      // Validation rules
      if (name.length < 3) {
        nameError.style.display = "block"; valid = false;
      }
      if (!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)) {
        emailError.style.display = "block"; valid = false;
      }
      if (password.length < 6) {
        passwordError.style.display = "block"; valid = false;
      }
      if (confirm !== password || confirm === "") {
        confirmError.style.display = "block"; valid = false;
      }

      // If valid, form submits normally
      return valid;
    }
  </script>
</body>
</html>
